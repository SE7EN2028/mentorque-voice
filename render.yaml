# Render Blueprint — deploys all three services from this monorepo.
# Dashboard → New → Blueprint → point at this repo. Fill the sync:false
# env vars when prompted. Database stays on Neon (external).
services:
  # ---------- REST API ----------
  - type: web
    name: mentorque-server
    runtime: node
    plan: free
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci --include=dev && npm run build -w packages/shared && npm run build -w packages/db && npm run build -w packages/interview-engine && npm run build -w packages/feedback-engine && npm run build -w packages/interview-session && npm run build -w apps/server
    startCommand: npm run start -w apps/server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://mentorque-client.onrender.com
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false

  # ---------- LiveKit voice agent ----------
  # Runs as a web service: the agents SDK's health-check HTTP server binds
  # $PORT (see apps/agent-worker/src/index.ts), which satisfies Render's
  # port scan. NOTE: on the free plan this spins down after 15 min idle and
  # the agent will NOT join interview rooms while asleep — use Starter or an
  # uptime pinger for demos.
  - type: web
    name: mentorque-agent
    runtime: node
    plan: free
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci --include=dev && npm run build -w packages/shared && npm run build -w packages/db && npm run build -w packages/interview-engine && npm run build -w packages/feedback-engine && npm run build -w packages/interview-session && npm run build -w apps/agent-worker
    startCommand: npm run start -w apps/agent-worker
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: TTS_PROVIDER
        value: cartesia
      - key: TURN_END_MIN_SILENCE_MS
        value: "2000"
      - key: DISABLE_LOCAL_INFERENCE
        value: "1"
      - key: WORKER_IDLE_PROCESSES
        value: "0"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false

  # ---------- React client ----------
  - type: web
    name: mentorque-client
    runtime: static
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci --include=dev && npm run build -w packages/shared && npm run build -w apps/client
    staticPublishPath: apps/client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        value: https://mentorque-server.onrender.com
